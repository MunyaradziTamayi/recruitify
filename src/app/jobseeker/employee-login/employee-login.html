<div class="login-wrapper">
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="login-card">
        <div class="brand">
            <h1>Recruitify</h1>
            <p class="subtitle">Job Seeker Portal</p>
        </div>

        <div class="auth-section">
            <h2>Welcome Back</h2>
            <p>Connect with your dream job today</p>

            <div *ngIf="!isProcessing" id="login_button"></div>

            <div *ngIf="isProcessing" class="processing-state" aria-live="polite">
                <div class="processing-spinner" aria-hidden="true"></div>
                <h3>Signing you in</h3>
                <p>{{ processingMessage }}</p>
                <p class="processing-note">Please keep this page open while we wait for the backend to respond.</p>
            </div>

            <p *ngIf="authError" class="auth-error">{{ authError }}</p>
        </div>

        <div class="card-footer">
            <p>By continuing, you agree to our <a>Terms of Service</a> and <a>Privacy Policy</a>.</p>
        </div>
    </div>
</div>
